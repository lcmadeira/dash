<script>
/* 1. CORREÇÃO COMBUSTÍVEIS: Garante a exibição de todos os itens */
function renderFuel(){
  const fuels=[
    {k:"g95", l:"Gasolina 95",      c:"var(--accent)"},
    {k:"g98", l:"Gasolina 98",      c:"var(--blue)"},
    {k:"gsl", l:"Gasóleo",          c:"var(--green)"},
    {k:"gslc",l:"Gasóleo Colorido", c:"var(--purple)"},
  ];
  // O segredo aqui é garantir que a fuel-grid não limite o número de linhas
  $("fuel-body").innerHTML=`
    <div class="fuel-grid" style="grid-template-columns: 1fr 1fr; display: grid; gap: 7px;">
      ${fuels.map(f=>{const i=FUEL[f.k];if(!i)return"";return`
        <div class="fi">
          <div class="fi-lbl">${f.l}</div>
          <div class="fi-price" style="color:${f.c}">${Number(i.p).toFixed(3)}</div>
          <div class="fi-unit">€ / litro</div>
          <div class="fi-chg ${i.v>0?"up":i.v<0?"dn":"fl"}">
            ${i.v>0?"▲":i.v<0?"▼":"—"} ${Math.abs(i.v).toFixed(3)}€
          </div>
        </div>`;}).join("")}
    </div>
    <div class="src">✦ ${FUEL.ref}</div>`;
}

/* 2. CORREÇÃO CRIPTO: Adicionado Delay para evitar erro de limite da API */
async function loadCrypto(){
  $("crypto-body").innerHTML=ld();
  try {
    const results = [];
    for(const c of CRYPTOS) {
      // Fazemos pedidos individuais com pausa para não bloquear a API Key gratuita
      try {
        const q = await tdGet("/quote", {symbol: c.sym});
        results.push({ ...c, q });
      } catch(e) { console.warn(`Erro no símbolo ${c.sym}`); }
      await new Promise(r => setTimeout(r, 1000)); // Pausa de 1s entre moedas
    }
    
    $("crypto-body").innerHTML=`<div class="crypto-list">${results.map(res=>{
      const price=parseFloat(res.q.close||res.q.price||0);
      const pc=parseFloat(res.q.percent_change||0);
      return `<div class="ci">
        <span class="ci-sym">${res.sym.split("/")[0]}</span>
        <span class="ci-name">${res.name}</span>
        <div>
          <div class="ci-price" style="color:${res.color}">${price>0?fmtP(price,2):"—"}</div>
          <div class="ci-chg">${price>0?chg(pc):""}</div>
        </div>
      </div>`;
    }).join("")}</div>`;
  } catch(e){ $("crypto-body").innerHTML=er("Erro ao conectar API"); }
}

/* 3. CORREÇÃO INDICADORES: Tratamento de NaN e Delay */
async function loadMarketStats(){
  $("mstats-body").innerHTML=ld();
  try {
    let html = `<div class="mstat-grid">`;
    for(const m of MSTATS){
      try {
        const j = await tdGet("/quote", {symbol:m.sym});
        const price = parseFloat(j.close||j.price);
        const change = parseFloat(j.percent_change||0);
        
        html += `<div class="mstat">
          <div class="mstat-lbl">${m.label}</div>
          <div class="mstat-val" style="color:${m.color}">${!isNaN(price)?fmtP(price,2):"—"}</div>
          <div class="mstat-sub">${m.sub}</div>
          <div class="mstat-chg">${!isNaN(change)?chg(change):""}</div>
        </div>`;
      } catch(e) {
        html += `<div class="mstat"><div class="mstat-lbl">${m.label}</div><div class="mstat-val">—</div></div>`;
      }
      await new Promise(r => setTimeout(r, 1000)); // Vital para evitar o "NaN" por bloqueio
    }
    html += `</div>`;
    $("mstats-body").innerHTML = html;
  } catch(e){ $("mstats-body").innerHTML=er("Erro nos indicadores"); }
}

/* 4. CORREÇÃO CALENDÁRIO: Removido limite de itens */
function renderCalendar(){
  // Certifica-te que o EVENTS tem todos os itens que desejas mostrar
  $("cal-body").innerHTML=`<div class="ev-list" style="max-height: none; overflow: visible;">
    ${EVENTS.map(e=>`
    <div class="ev">
      <div class="ev-dot" style="background:${e.imp==="h"?"var(--red)":e.imp==="m"?"var(--accent)":"var(--green)"}"></div>
      <div class="ev-body">
        <div class="ev-title">${e.country} ${e.title}</div>
        <div class="ev-meta">
          <span>${e.date} · ${e.time}</span>
          <span class="ev-imp ${IMP_CSS[e.imp]}">${IMP_LABEL[e.imp]}</span>
        </div>
      </div>
    </div>`).join("")}</div>`;
}
</script>
