<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Painel Pessoal · Portugal</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --bg: #07090E; --surface: #0B0E17; --card: #0F1220; --card-h: #131728;
  --b: #181D30; --b2: #202540; --accent: #E9A520; --ad: #E9A52014;
  --blue: #4B96F3; --bd: #4B96F312; --green: #34C97A; --gd: #34C97A12;
  --red: #EF5757; --rd: #EF575712; --purple: #9575F0; --pd: #9575F012;
  --text: #DDE3F0; --t2: #8892A8; --t3: #3D4560;
  --font: 'Plus Jakarta Sans', sans-serif; --mono: 'DM Mono', monospace;
  --r: 10px; --rs: 7px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;-webkit-font-smoothing:antialiased;padding:20px}
.wrap{max-width:1400px;margin:0 auto}
.hdr{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--b)}
.clk-time{font-family:var(--mono);font-size:2rem;color:var(--accent);text-align:center}
.grid{display:grid;grid-template-columns:300px 1fr 1fr;gap:15px}
.card{background:var(--card);border:1px solid var(--b);border-radius:var(--r);padding:16px;position:relative;overflow:hidden}
.s2{grid-column:span 2} .s3{grid-column:span 3} .r2{grid-row:span 2}
.ch{display:flex;align-items:center;gap:8px;margin-bottom:15px}
.ch-lbl{font-size:.7rem;font-weight:700;text-transform:uppercase;color:var(--t2);letter-spacing:1px}
.rbtn{background:none;border:1px solid var(--b);color:var(--t3);padding:2px 8px;border-radius:4px;font-size:.6rem;cursor:pointer}
.ld{display:flex;justify-content:center;padding:20px}
.spin{width:20px;height:20px;border:2px solid var(--b2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Financeiro */
.fin-tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:15px}
.ftab{background:var(--surface);border:1px solid var(--b);padding:10px;border-radius:var(--rs);cursor:pointer}
.ftab.on{border-color:var(--accent);background:var(--ad)}
.chart-box{height:250px;position:relative;background:var(--surface);border-radius:var(--rs);padding:10px}

/* Combustíveis */
.fuel-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fi{background:var(--surface);border:1px solid var(--b);padding:10px;border-radius:var(--rs)}
.fi-lbl{font-size:.6rem;color:var(--t3);text-transform:uppercase}
.fi-price{font-size:1.4rem;font-weight:700;margin:4px 0}

/* Cripto e News */
.ci{display:flex;justify-content:space-between;padding:8px;border-bottom:1px solid var(--b)}
.ni{margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--b)}
.up{color:var(--green)} .dn{color:var(--red)}
</style>
</head>
<body>

<div class="wrap">
  <header class="hdr">
    <div><h1 style="font-size:1.4rem">Painel Pessoal</h1><p style="font-size:.7rem;color:var(--t3)">PORTUGAL · GITHUB PAGES</p></div>
    <div><div class="clk-time" id="clk">00:00:00</div><div id="clkd" style="text-align:center;font-size:.7rem;color:var(--t2)">--</div></div>
    <div style="text-align:right"><span id="fin-st" style="font-size:.6rem;color:var(--t3)">A carregar...</span></div>
  </header>

  <div class="grid">
    <div class="card r2">
      <div class="ch"><span class="ch-lbl">🌡️ Meteorologia</span></div>
      <div id="wx-body"><div class="ld"><div class="spin"></div></div></div>
    </div>

    <div class="card s2">
      <div class="ch"><span class="ch-lbl">🌍 Notícias</span></div>
      <div id="news-body"><div class="ld"><div class="spin"></div></div></div>
    </div>

    <div class="card s3">
      <div class="ch">
        <span class="ch-lbl">📈 Mercados</span>
        <div style="margin-left:auto; display:flex; gap:5px">
          <button class="rbtn" onclick="setPeriod('1M')">1M</button>
          <button class="rbtn" onclick="setPeriod('3M')">3M</button>
        </div>
      </div>
      <div class="fin-tabs" id="fin-tabs"></div>
      <div class="chart-box"><canvas id="fin-chart"></canvas></div>
    </div>

    <div class="card">
      <div class="ch"><span class="ch-lbl">⛽ Combustíveis</span></div>
      <div id="fuel-body"></div>
    </div>

    <div class="card">
      <div class="ch"><span class="ch-lbl">₿ Cripto</span></div>
      <div id="crypto-body"></div>
    </div>

    <div class="card">
      <div class="ch"><span class="ch-lbl">📅 Calendário</span></div>
      <div id="cal-body"></div>
    </div>
  </div>
</div>

<script>
const CFG = { 
  TD: "ac8049c9d6c34e40bf50b758be66c056", 
  OWM: "629e7f02ba9f3025f188390200242378",
  GNEWS: "37ba83efc653917c93a2669c49019c6f"
};

const ASSETS = [
  {id:"SPY", sym:"SPY", color:"#4B96F3"}, {id:"BTC", sym:"BTC/USD", color:"#F97316"},
  {id:"EDP", sym:"EDP.LS", color:"#EF5757"}, {id:"EUR", sym:"EUR/USD", color:"#34C97A"}
];

const $ = id => document.getElementById(id);
const sleep = ms => new Promise(r => setTimeout(r, ms));
let chartInst = null, selA = ASSETS[0], selP = "1M", quotes = {};

// Relógio
setInterval(() => {
  const n = new Date();
  $("clk").textContent = n.toLocaleTimeString("pt-PT");
  $("clkd").textContent = n.toLocaleDateString("pt-PT", {weekday:'long', day:'numeric', month:'long'});
}, 1000);

// Meteorologia
async function loadWeather() {
  try {
    const r = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=Evora,PT&units=metric&lang=pt&appid=${CFG.OWM}`);
    const d = await r.json();
    $("wx-body").innerHTML = `<div style="text-align:center"><div style="font-size:3rem">${Math.round(d.main.temp)}°C</div><p>${d.weather[0].description}</p><p style="color:var(--t3);font-size:.7rem">Humidade: ${d.main.humidity}%</p></div>`;
  } catch(e) { $("wx-body").innerHTML = "Erro Weather"; }
}

// Notícias
async function loadNews() {
  try {
    const r = await fetch(`https://gnews.io/api/v4/top-headlines?lang=pt&country=pt&max=4&apikey=${CFG.GNEWS}`);
    const d = await r.json();
    $("news-body").innerHTML = d.articles.map(a => `<div class="ni"><a href="${a.url}" target="_blank" style="color:var(--text);font-size:.85rem;text-decoration:none">${a.title}</a></div>`).join("");
  } catch(e) { $("news-body").innerHTML = "Erro News"; }
}

// Financeiro e Gráfico
async function loadFinance() {
  $("fin-st").textContent = "A atualizar...";
  try {
    const syms = ASSETS.map(a => a.sym).join(",");
    const r = await fetch(`https://api.twelvedata.com/quote?symbol=${syms}&apikey=${CFG.TD}`);
    const d = await r.json();
    ASSETS.forEach(a => { const q = d[a.sym] || d; quotes[a.id] = q; });
    renderTabs();
    updateChart();
    $("fin-st").textContent = "✓ Atualizado";
  } catch(e) { $("fin-st").textContent = "Erro API"; }
}

function renderTabs() {
  $("fin-tabs").innerHTML = ASSETS.map(a => {
    const q = quotes[a.id];
    return `<div class="ftab ${selA.id===a.id?'on':''}" onclick="selAsset('${a.id}')">
      <div style="font-size:.6rem;color:var(--t3)">${a.id}</div>
      <div style="font-weight:700">${q?Number(q.close).toFixed(2):'--'}</div>
    </div>`;
  }).join("");
}

function selAsset(id) { selA = ASSETS.find(a=>a.id===id); renderTabs(); updateChart(); }
function setPeriod(p) { selP = p; updateChart(); }

async function updateChart() {
  if(chartInst) chartInst.destroy();
  const size = selP === "1M" ? 30 : 90;
  try {
    const r = await fetch(`https://api.twelvedata.com/time_series?symbol=${selA.sym}&interval=1day&outputsize=${size}&apikey=${CFG.TD}`);
    const d = await r.json();
    const vals = d.values.reverse();
    chartInst = new Chart($("fin-chart"), {
      type: 'line',
      data: {
        labels: vals.map(v => v.datetime.slice(5)),
        datasets: [{ data: vals.map(v => v.close), borderColor: selA.color, fill: false, pointRadius: 0 }]
      },
      options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false } } }
    });
  } catch(e) {}
}

// Combustíveis
function renderFuel() {
  const data = [
    {n:"G95", p:1.749, v:-0.01}, {n:"G98", p:1.889, v:0.02},
    {n:"DSL", p:1.624, v:0.01}, {n:"AGR", p:1.210, v:0.00}
  ];
  $("fuel-body").innerHTML = `<div class="fuel-grid">${data.map(f => `
    <div class="fi">
      <div class="fi-lbl">${f.n}</div>
      <div class="fi-price">${f.p.toFixed(3)}€</div>
      <div style="font-size:.6rem" class="${f.v>=0?'up':'dn'}">${f.v>=0?'▲':'▼'} ${Math.abs(f.v)}</div>
    </div>`).join("")}</div>`;
}

// Cripto com Delay para evitar Erro API
async function loadCrypto() {
  const cryptos = [{s:"ETH/USD", n:"Ethereum"}, {s:"SOL/USD", n:"Solana"}];
  let h = "";
  for(const c of cryptos) {
    await sleep(1200); // Pausa para não exceder limite da Twelve Data
    try {
      const r = await fetch(`https://api.twelvedata.com/quote?symbol=${c.s}&apikey=${CFG.TD}`);
      const d = await r.json();
      h += `<div class="ci"><span>${c.n}</span><b>${Number(d.close).toFixed(2)}$</b></div>`;
    } catch(e) { h += `<div class="ci"><span>${c.n}</span><b>Erro</b></div>`; }
  }
  $("crypto-body").innerHTML = h;
}

// Calendário
function renderCal() {
  const evs = [
    {d:"06 Mar", t:"BCE Juros", i:"h"}, {d:"12 Mar", t:"Inflação EUA", i:"h"},
    {d:"15 Mar", t:"Confiança Consumidor", i:"m"}, {d:"20 Mar", t:"Reunião FED", i:"h"}
  ];
  $("cal-body").innerHTML = evs.map(e => `<div style="font-size:.75rem;margin-bottom:8px"><b>${e.d}:</b> ${e.t}</div>`).join("");
}

// Init
loadWeather(); loadNews(); loadFinance(); renderFuel(); loadCrypto(); renderCal();
</script>
</body>
</html>
